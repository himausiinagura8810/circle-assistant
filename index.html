<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同人誌即売会アシスタント</title>
    <link rel="stylesheet" href="style.css"> 
</head>

<body>

    <main class="app">

    <section id="home-screen" class="screen active">

        <div class="menu-panel">

            <h1>ようこそ！</h1>

            <p>
                今日は来てくれてありがとうございます！
            </p>

            <div class="menu-buttons">
                <button onclick="openScreen('newbook')">新刊を見る</button>
                <button onclick="openScreen('backlist')">既刊を見る</button>
                <button onclick="openScreen('profile')">作者紹介</button>
                <button onclick="openScreen('sns')">SNSを見る</button>
            </div>

        </div>

        <div class="character-panel">
            <img
                class="character-image"
                src="character.png"
                alt="案内キャラクター"
            >
        </div>

    </section>

    <section id="detail-screen" class="screen">

        <div class="detail-panel">

            <button class="back-button" onclick="goHome()">
                ← 戻る
            </button>

            <h1 id="detail-title">新刊情報</h1>

            <p id="detail-message">
                こちらが今回の新刊です！
            </p>

            <div id="detail-content" class="detail-content">
            </div>

        </div>

        <div class="character-panel">
            <img
                class="character-image"
                src="character.png"
                alt="案内キャラクター"
            >
        </div>

    </section>

</main>

    <script src="script.js"></script>

</body>
</html>
