<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同人誌即売会アシスタント</title>
    <link rel="stylesheet" href="style.css"> 
</head>

<body>

    <main class="app">

        <section class="menu-panel">

            <h1 id="title">ようこそ！</h1>

            <p id="message">
                今日は来てくれてありがとうございます！
            </p>

            <div id="content" class="content-panel">
    <p>気になるメニューを選んでください。</p>
</div>

            <div class="menu-buttons">
                <button onclick="showNewBook()">新刊を見る</button>
                <button onclick="showBacklist()">既刊を見る</button>
                <button onclick="showProfile()">作者紹介</button>
                <button onclick="showSNS()">SNSを見る</button>
            </div>

        </section>

        <section class="character-panel">

            <img
                class="character-image"
                src="character.png"
                alt="案内キャラクター"
            >

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
